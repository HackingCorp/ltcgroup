services:
  db:
    image: postgres:16-alpine
    container_name: ltcpay-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ltcpay
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ltcpay_secret}
      POSTGRES_DB: ltcpay
    volumes:
      - ltcpay_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ltcpay"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ltcpay-redis
    restart: unless-stopped
    volumes:
      - ltcpay_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ltcpay-backend
    restart: unless-stopped
    expose:
      - "8000"
    environment:
      # Configuration
      ENVIRONMENT: ${ENVIRONMENT:-development}
      BASE_URL: ${BASE_URL:-http://localhost:8001}
      WEBHOOK_BASE_URL: ${WEBHOOK_BASE_URL:-http://localhost:8001}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:8000,http://localhost:8001,https://app.ltcgroup.site,https://pay.ltcgroup.site}
      # Security
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-}
      SECRET_KEY: ${SECRET_KEY:-}
      # TouchPay
      TOUCHPAY_SDK_URL: ${TOUCHPAY_SDK_URL:-https://touchpay.gutouch.com/touchpayv2/script/prod_touchpay-0.0.1.js}
      TOUCHPAY_CALLBACK_URL: ${TOUCHPAY_CALLBACK_URL:-http://localhost:8001/api/v1/callbacks/touchpay}
      TOUCHPAY_MERCHANT_ID: ${TOUCHPAY_MERCHANT_ID:-LTCGR11789}
      TOUCHPAY_SECURE_CODE: ${TOUCHPAY_SECURE_CODE:-}
      TOUCHPAY_MERCHANT_WEBSITE: ${TOUCHPAY_MERCHANT_WEBSITE:-pay.ltcgroup.site}
      TOUCHPAY_SECRET: ${TOUCHPAY_SECRET:-}
      # Database & Redis
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://ltcpay:ltcpay_secret@db:5432/ltcpay}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/1}
    volumes:
      - ./backend/app:/app/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: ./WebLTcPay
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8001}
    container_name: ltcpay-web
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      NODE_ENV: production
    depends_on:
      - backend

volumes:
  ltcpay_pgdata:
  ltcpay_redis:
